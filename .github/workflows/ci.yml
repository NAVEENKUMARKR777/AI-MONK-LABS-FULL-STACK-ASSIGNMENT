name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx  # required by fastapi.testclient

      - name: Smoke-test API (TestClient CRUD)
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from main import app

          c = TestClient(app)

          assert c.get("/trees").status_code == 200

          r = c.post("/trees", json={"tree": {"name": "root", "children": [{"name": "c1", "data": "hello"}]}})
          assert r.status_code == 201, r.text
          tid = r.json()["id"]

          r2 = c.put(f"/trees/{tid}", json={"tree": {"name": "root", "children": [{"name": "c1", "data": "updated"}]}})
          assert r2.status_code == 200
          assert r2.json()["tree"]["children"][0]["data"] == "updated"

          assert c.delete(f"/trees/{tid}").status_code == 204
          print("backend smoke test ok")
          PY

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  docker:
    name: Combined Docker image
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build combined image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: nested-tags-tree:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Boot container and probe endpoints
        run: |
          docker run -d --name app -p 8080:8080 nested-tags-tree:ci

          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/api/trees >/dev/null 2>&1; then
              echo "API reachable after ${i}s"
              break
            fi
            sleep 1
          done

          echo "--- /api/trees ---"
          curl -fsS http://localhost:8080/api/trees | head -c 500; echo
          echo "--- / (index.html head) ---"
          curl -fsS http://localhost:8080/ | head -c 300; echo

          docker logs app | tail -50
          docker rm -f app
